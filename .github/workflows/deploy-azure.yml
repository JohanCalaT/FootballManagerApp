name: Deploy · Azure

# ─────────────────────────────────────────────────────────────
# Workflow de deploy:
#  - AUTO: cada push a `develop` (→ staging) o `main` (→ production)
#    cuando se toquen `src/FootballManagerApp/**`, `frontend/**`,
#    `backend-node/**`, `backend-corba/**`, `azure.yaml`, `infra/**`
#    o este propio workflow.
#  - MANUAL: desde Actions → "Deploy · Azure" → Run workflow, con
#    inputs para elegir target y si saltar provision.
#
# Para pausar el auto-deploy (ahorrar costos Azure):
# comentar el bloque `push:` dentro de `on:`.
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Qué desplegar'
        required: true
        default: 'all'
        type: choice
        options:
          - all              # provision (si toca) + deploy de todo
          - dotnet-only      # solo Aspire AppHost (players-api, comments-api, gateway)
          - frontend-only    # solo Ionic/Angular Container App
          - node-only        # solo backend Express
          - infra-only       # solo azd provision (Bicep / azure.yaml)
      skip_provision:
        description: '¿Saltar provision? (true si los recursos ya existen)'
        required: true
        default: 'true'
        type: boolean

  # === AUTO-DEPLOY ACTIVO ===
  # Cualquier push a develop o main que toque uno de estos paths
  # dispara deploy con target=all y skip_provision=true (defaults).
  # Si la rama es develop  → environment "staging"
  # Si la rama es main     → environment "production"
  # Para volver a pausar y ahorrar costos: comentar este bloque entero.
  push:
    branches: [develop, main]
    paths:
      - 'src/FootballManagerApp/**'
      - 'frontend/**'
      - 'backend-node/**'
      - 'backend-corba/**'
      - 'azure.yaml'
      - 'infra/**'
      - '.github/workflows/deploy-azure.yml'
  # ===========================

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.target || 'all' }} → ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    env:
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      # Effective deploy inputs. workflow_dispatch los toma del UI;
      # push events caen al default `all` / `true`.
      TARGET: ${{ github.event.inputs.target || 'all' }}
      SKIP_PROVISION: ${{ github.event.inputs.skip_provision || 'true' }}
      # Habilita que Docker buildkit embeba metadata de caché en las
      # imágenes que sube a ACR. Permite que el siguiente build
      # reuse capas remotas via --cache-from.
      DOCKER_BUILDKIT: 1
      BUILDKIT_INLINE_CACHE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show deploy plan
        run: |
          echo "════════════════════════════════════════"
          echo "  Trigger:        ${{ github.event_name }}"
          echo "  Target:         $TARGET"
          echo "  Skip provision: $SKIP_PROVISION"
          echo "  Environment:    $AZURE_ENV_NAME"
          echo "  Ref:            ${{ github.ref }}"
          echo "════════════════════════════════════════"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Azure login (federated)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      # ── DOCKER BUILDX + ACR CACHE WARMUP ─────────────────────
      # Activa buildx (necesario para BUILDKIT_INLINE_CACHE) y
      # pre-descarga las imágenes existentes de ACR para sembrar
      # la caché Docker local del runner. Sin esto, cada deploy
      # arranca con caché vacía y reconstruye todo desde cero.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker         # usar el daemon local en vez de un contenedor builder, para que azd vea el caché

      - name: Azure CLI login (para az acr login)
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Discover ACR endpoint (si los recursos existen)
        id: acr
        continue-on-error: true
        run: |
          ENDPOINT=$(azd env get-value AZURE_CONTAINER_REGISTRY_ENDPOINT 2>/dev/null || echo "")
          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"
          if [ -n "$ENDPOINT" ]; then
            REGISTRY_NAME=$(echo "$ENDPOINT" | cut -d'.' -f1)
            echo "registry=$REGISTRY_NAME" >> "$GITHUB_OUTPUT"
            echo "::notice title=ACR detectado::$ENDPOINT"
          else
            echo "::notice title=ACR no encontrado::Primer deploy o infra no provisionada — sin caché previa"
          fi

      - name: Login a ACR
        if: steps.acr.outputs.registry != ''
        run: az acr login --name ${{ steps.acr.outputs.registry }}

      - name: Pre-pull imágenes anteriores (warm cache)
        if: steps.acr.outputs.endpoint != ''
        continue-on-error: true
        run: |
          # Si una imagen no existe (primer deploy), continuamos.
          # Cuantas más imágenes podamos pre-pull, más layers reusará buildx.
          for svc in players-api comments-api gateway ionic-app node-backend corba-server news-adapter; do
            IMAGE="${{ steps.acr.outputs.endpoint }}/$svc:latest"
            echo "→ Pulling $IMAGE para sembrar caché..."
            docker pull "$IMAGE" 2>/dev/null \
              && echo "  ✓ $svc en caché local" \
              || echo "  ⚠ $svc no existe aún (primer deploy de este servicio)"
          done

      # ── PROVISION ────────────────────────────────────────────
      - name: Provision infrastructure
        if: ${{ env.SKIP_PROVISION == 'false' || env.TARGET == 'infra-only' || env.TARGET == 'all' }}
        run: azd provision --no-prompt
        env:
          AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

      # ── DEPLOY ───────────────────────────────────────────────
      # Aspire AppHost = 1 service "app" en azure.yaml → azd deploy
      # despliega todos los contenedores (players-api, comments-api,
      # gateway, ionic-app, node-backend, corba-server, news-adapter) y
      # Docker layer cache hace builds incrementales en los que no
      # cambiaron.
      - name: Deploy all (Aspire AppHost completo)
        if: ${{ env.TARGET == 'all' }}
        run: azd deploy --no-prompt

      - name: Deploy .NET services only (players-api, comments-api, gateway)
        if: ${{ env.TARGET == 'dotnet-only' }}
        run: |
          # Aspire empaqueta los .NET juntos. azd deploy de la
          # service "app" reconstruye solo lo que cambió (Docker cache).
          azd deploy app --no-prompt

      - name: Deploy frontend only (ionic-app)
        if: ${{ env.TARGET == 'frontend-only' }}
        run: |
          # Cuando azd 1.x no permite filtrar sub-recursos de Aspire,
          # el deploy completo es la opción soportada. La caché Docker
          # de los demás contenedores hace que solo el frontend se
          # reconstruya/empuje realmente.
          azd deploy app --no-prompt

      - name: Deploy backend-node only
        if: ${{ env.TARGET == 'node-only' }}
        run: |
          azd deploy app --no-prompt

      - name: Summary
        if: always()
        run: |
          echo "::notice title=Deploy finalizado::Target=$TARGET · Env=$AZURE_ENV_NAME"
