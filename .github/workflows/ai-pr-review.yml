name: ai-pr-review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Gemini review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache by head SHA
        id: cache
        uses: actions/cache@v4
        with:
          path: .github/ai-review/.cache
          key: ai-review-${{ github.event.pull_request.head.sha }}

      - name: Skip if already reviewed
        if: steps.cache.outputs.cache-hit == 'true'
        run: echo "Head SHA already reviewed — skipping."

      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: .github/ai-review
        run: npm install --no-audit --no-fund

      - name: Run AI review
        if: steps.cache.outputs.cache-hit != 'true'
        working-directory: .github/ai-review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TARGET_BRANCH: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          npm run review
          mkdir -p .cache
          echo "$HEAD_SHA" > .cache/last-sha
