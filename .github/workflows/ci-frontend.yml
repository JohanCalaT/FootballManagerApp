name: CI · Frontend (Ionic/Angular)

on:
  push:
    branches: [develop, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend

jobs:
  build-test-lint:
    name: Build · Lint · Test · Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ng lint)
        run: npm run lint -- --format=stylish
        continue-on-error: false

      - name: Test + coverage (Karma headless)
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build production
        run: npx ng build --configuration=production

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14
          if-no-files-found: warn
