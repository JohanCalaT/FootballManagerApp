name: CI · Backend .NET (Aspire)

on:
  push:
    branches: [develop, main]
    paths:
      - 'src/FootballManagerApp/**'
      - '.github/workflows/ci-backend-dotnet.yml'
  pull_request:
    paths:
      - 'src/FootballManagerApp/**'
      - '.github/workflows/ci-backend-dotnet.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-backend-dotnet-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION: src/FootballManagerApp/FootballManagerApp.slnx
  CONFIG: Release

jobs:
  build-test-lint:
    name: Build · Format · Test · Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/FootballManagerApp/**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore $SOLUTION

      - name: Format verify (dotnet format)
        run: dotnet format $SOLUTION --verify-no-changes --severity warn
        continue-on-error: true

      - name: Build
        run: dotnet build $SOLUTION --configuration $CONFIG --no-restore

      - name: Test + coverage (xUnit + coverlet)
        run: |
          dotnet test $SOLUTION \
            --configuration $CONFIG \
            --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: TestResults/**/coverage.cobertura.xml
          retention-days: 14
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: TestResults/**/*.trx
          retention-days: 14
          if-no-files-found: warn
